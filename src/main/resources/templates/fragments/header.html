<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="header(activePage)" class="sticky top-0 w-full z-50 bg-white/95 backdrop-blur shadow-sm border-b border-slate-100"
            th:with="isAuthenticated=${#authentication.name != 'anonymousUser'},
                     currentUser=${isAuthenticated ? #authentication.principal.user : null},
                     isGuide=${isAuthenticated and currentUser != null and currentUser.role.name() == 'GUIDE'},
                     isTourist=${isAuthenticated and currentUser != null and currentUser.role.name() == 'TOURIST'},
                     isAdmin=${isAuthenticated and currentUser != null and currentUser.role.name() == 'ADMIN'}">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between gap-4 h-[70px]">

                <!-- Logo -->
                <a th:href="${isGuide ? '/home/tourguide/' + currentUser.id : (isTourist ? '/home/tourist/' + currentUser.id : (isAdmin ? '/home/admin/' + currentUser.id : '/'))}"
                   class="flex items-center gap-3 shrink-0 group">
                    <div class="w-9 h-9 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-md group-hover:scale-105 transition-transform">
                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-lg font-black text-slate-900 tracking-tight leading-none group-hover:text-blue-600 transition-colors">Sri Lanka Tours</h1>
                        <span class="text-[8px] text-slate-500 font-bold uppercase tracking-[0.28em] mt-0.5">Wonders Await You</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <nav class="hidden lg:flex items-center gap-5 flex-1 justify-center">
                    <a th:href="${isGuide ? '/home/tourguide/' + currentUser.id : (isTourist ? '/home/tourist/' + currentUser.id : (isAdmin ? '/home/admin/' + currentUser.id : '/'))}"
                       th:class="${activePage == 'home' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Home</a>
                    <a href="/tourist/destinations"
                       th:class="${activePage == 'destinations' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Destinations</a>
                    <a href="/tourist/guides"
                       th:class="${activePage == 'guides' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Tour Guides</a>
                    <a th:if="${isTourist}" href="/tourist/bookings"
                       th:class="${activePage == 'bookings' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Bookings</a>
                    <a th:href="${isGuide ? '/home/tourguide/' + currentUser.id + '/tours' : '/tourist/tour-plans'}"
                       th:class="${activePage == 'tour-plans' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Tours</a>
                    <a th:href="@{/tourist/tour-plans/build}"
                       th:class="${activePage == 'custom-plan' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Custom Plan</a>
                    <a href="/reviews"
                       th:class="${activePage == 'reviews' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Reviews</a>
                    <a href="/about-us"
                       th:class="${activePage == 'about' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">About Us</a>
                    <a href="/contact-us"
                       th:class="${activePage == 'contact' ? 'text-blue-600 text-sm font-bold border-b-2 border-blue-600 py-1 whitespace-nowrap' : 'text-slate-600 text-sm hover:text-blue-600 font-semibold transition-colors whitespace-nowrap'}">Contact</a>
                </nav>

                <!-- Desktop Auth -->
                <div class="hidden lg:flex items-center gap-3 shrink-0">
                    <div th:if="${isAuthenticated}"
                         th:with="signedInDisplayName=${currentUser.name != null and !#strings.isEmpty(#strings.trim(currentUser.name)) ? #strings.trim(currentUser.name) : 'User'}">
                        <div class="flex items-center gap-3">
                            <div class="text-right hidden xl:block">
                                <p class="text-sm font-black text-slate-800" th:text="${signedInDisplayName}">User</p>
                                <p class="text-[11px] font-bold text-slate-500" th:text="${currentUser.email}">user@email.com</p>
                            </div>
                            <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center shrink-0">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </div>
                            <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-sm">
                                    <i data-lucide="log-out" class="w-4 h-4"></i>
                                    <span>Logout</span>
                                </button>
                            </form>
                        </div>
                    </div>
                    <div th:if="${#authentication.name == 'anonymousUser'}" class="flex items-center gap-2">
                        <a href="/login" class="flex items-center gap-1.5 px-4 py-2 text-sm text-blue-600 font-bold rounded-xl border border-blue-600 hover:bg-blue-50 transition-colors">
                            <i data-lucide="log-in" class="w-4 h-4"></i>
                            <span>Login</span>
                        </a>
                        <a href="/register" class="flex items-center gap-1.5 px-4 py-2 text-sm bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md shadow-blue-200 transition-all">
                            <i data-lucide="user-plus" class="w-4 h-4"></i>
                            <span>Register</span>
                        </a>
                    </div>
                </div>

                <!-- Mobile Hamburger Button -->
                <button id="mobile-menu-btn"
                        onclick="toggleMobileMenu()"
                        class="lg:hidden flex items-center justify-center w-9 h-9 rounded-lg border border-slate-200 bg-white text-slate-700 hover:bg-blue-50 hover:border-blue-200 transition-colors shrink-0"
                        aria-label="Toggle navigation menu"
                        aria-expanded="false">
                    <i data-lucide="menu" class="w-5 h-5" id="hamburger-icon"></i>
                    <i data-lucide="x" class="w-5 h-5 hidden" id="close-icon"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div id="mobile-menu"
             class="hidden lg:hidden border-t border-slate-100 bg-white shadow-lg"
             aria-hidden="true">
            <div class="max-w-7xl mx-auto px-4 py-3 space-y-1">

                <!-- Mobile Nav Links -->
                <a th:href="${isGuide ? '/home/tourguide/' + currentUser.id : (isTourist ? '/home/tourist/' + currentUser.id : (isAdmin ? '/home/admin/' + currentUser.id : '/'))}"
                   th:class="${activePage == 'home' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="home" class="w-4 h-4 shrink-0"></i> Home
                </a>
                <a href="/tourist/destinations"
                   th:class="${activePage == 'destinations' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="map" class="w-4 h-4 shrink-0"></i> Destinations
                </a>
                <a href="/tourist/guides"
                   th:class="${activePage == 'guides' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="users" class="w-4 h-4 shrink-0"></i> Tour Guides
                </a>
                <a th:if="${isTourist}" href="/tourist/bookings"
                   th:class="${activePage == 'bookings' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="calendar" class="w-4 h-4 shrink-0"></i> Bookings
                </a>
                <a th:href="${isGuide ? '/home/tourguide/' + currentUser.id + '/tours' : '/tourist/tour-plans'}"
                   th:class="${activePage == 'tour-plans' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="route" class="w-4 h-4 shrink-0"></i> Tours
                </a>
                <a th:href="@{/tourist/tour-plans/build}"
                   th:class="${activePage == 'custom-plan' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="sparkles" class="w-4 h-4 shrink-0"></i> Custom Plan
                </a>
                <a href="/reviews"
                   th:class="${activePage == 'reviews' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="star" class="w-4 h-4 shrink-0"></i> Reviews
                </a>
                <a href="/about-us"
                   th:class="${activePage == 'about' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="info" class="w-4 h-4 shrink-0"></i> About Us
                </a>
                <a href="/contact-us"
                   th:class="${activePage == 'contact' ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-bold text-sm' : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors'}">
                    <i data-lucide="mail" class="w-4 h-4 shrink-0"></i> Contact
                </a>

                <!-- Mobile Auth -->
                <div class="pt-2 border-t border-slate-100 mt-2">
                    <div th:if="${isAuthenticated}"
                         th:with="signedInDisplayName=${currentUser.name != null and !#strings.isEmpty(#strings.trim(currentUser.name)) ? #strings.trim(currentUser.name) : 'User'}">
                        <div class="flex items-center justify-between px-3 py-2.5 rounded-xl bg-slate-50 mb-2">
                            <div class="flex items-center gap-2.5">
                                <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center">
                                    <i data-lucide="user" class="w-4 h-4"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-slate-800" th:text="${signedInDisplayName}">User</p>
                                    <p class="text-[11px] font-medium text-slate-500" th:text="${currentUser.email}">user@email.com</p>
                                </div>
                            </div>
                        </div>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="w-full flex items-center justify-center gap-2 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 font-bold px-4 py-2.5 rounded-xl text-sm transition-colors">
                                <i data-lucide="log-out" class="w-4 h-4"></i>
                                <span>Logout</span>
                            </button>
                        </form>
                    </div>
                    <div th:if="${#authentication.name == 'anonymousUser'}" class="flex flex-col gap-2">
                        <a href="/login" class="flex items-center justify-center gap-2 px-4 py-2.5 text-sm text-blue-600 font-bold rounded-xl border border-blue-600 hover:bg-blue-50 transition-colors">
                            <i data-lucide="log-in" class="w-4 h-4"></i>
                            Login
                        </a>
                        <a href="/register" class="flex items-center justify-center gap-2 px-4 py-2.5 text-sm bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all">
                            <i data-lucide="user-plus" class="w-4 h-4"></i>
                            Register
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function toggleMobileMenu() {
                const menu = document.getElementById('mobile-menu');
                const btn = document.getElementById('mobile-menu-btn');
                const hamburger = document.getElementById('hamburger-icon');
                const closeIcon = document.getElementById('close-icon');
                const isOpen = !menu.classList.contains('hidden');

                if (isOpen) {
                    menu.classList.add('hidden');
                    hamburger.classList.remove('hidden');
                    closeIcon.classList.add('hidden');
                    btn.setAttribute('aria-expanded', 'false');
                    menu.setAttribute('aria-hidden', 'true');
                } else {
                    menu.classList.remove('hidden');
                    hamburger.classList.add('hidden');
                    closeIcon.classList.remove('hidden');
                    btn.setAttribute('aria-expanded', 'true');
                    menu.setAttribute('aria-hidden', 'false');
                }
            }

            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                const menu = document.getElementById('mobile-menu');
                const btn = document.getElementById('mobile-menu-btn');
                if (!menu.classList.contains('hidden') && !menu.contains(event.target) && !btn.contains(event.target)) {
                    const hamburger = document.getElementById('hamburger-icon');
                    const closeIcon = document.getElementById('close-icon');
                    menu.classList.add('hidden');
                    hamburger.classList.remove('hidden');
                    closeIcon.classList.add('hidden');
                    btn.setAttribute('aria-expanded', 'false');
                    menu.setAttribute('aria-hidden', 'true');
                }
            });
        </script>
    </header>
</body>
</html>
