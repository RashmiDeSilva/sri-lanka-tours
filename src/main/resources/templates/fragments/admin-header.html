<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="header(title, subtitle)" class="h-[72px] bg-white border-b border-slate-200 flex items-center justify-between px-6 md:px-8 shrink-0">
        <div>
            <h1 class="text-xl font-black text-slate-950" th:text="${title}">Admin Dashboard</h1>
            <p class="text-xs font-semibold text-slate-500" th:text="${subtitle}">Manage the system</p>
        </div>

        <div class="flex items-center gap-3">
            <div class="hidden md:block text-right">
                <p class="text-sm font-black text-slate-800" th:text="${currentAdmin != null ? currentAdmin.name : 'Admin'}">Admin</p>
                <p class="text-[11px] font-bold text-slate-500" th:text="${currentAdmin != null ? currentAdmin.email : 'Administrator'}">admin@example.com</p>
            </div>
            <div class="w-9 h-9 rounded-lg bg-blue-600 text-white flex items-center justify-center">
                <i data-lucide="shield" class="w-5 h-5"></i>
            </div>
            <form th:action="@{/logout}" method="post">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 font-bold px-4 py-2 rounded-lg flex items-center gap-2 text-sm">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </form>
        </div>
    </header>
</body>
</html>
