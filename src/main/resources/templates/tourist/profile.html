<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Sri Lanka Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .ocean-bg { background: linear-gradient(135deg, #f0f9ff 0%, #e8f4fd 50%, #f0f9ff 100%); min-height: 100vh; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col ocean-bg">

    <header th:replace="~{fragments/header :: header('profile')}"></header>

    <!-- Page Header -->
    <div class="relative w-full bg-[#f0f8ff] pt-12 pb-8 border-b border-blue-100">
        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div class="flex items-center gap-2 text-sm font-semibold text-slate-500 mb-4">
                <a href="/" class="hover:text-blue-600 transition-colors">Home</a>
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                <span class="text-blue-600">Profile</span>
            </div>

            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-2">My Profile</h1>
            <p class="text-slate-600 font-medium max-w-2xl">Manage your personal information and contact details.</p>
        </div>
    </div>

    <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <main class="flex-1 p-8 max-w-7xl mx-auto w-full space-y-8">
            <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3 shadow-sm font-bold text-sm max-w-2xl">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span th:text="${error}">We could not save your changes.</span>
            </div>
            <!-- Success Message Notification -->
            <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3 shadow-sm font-bold text-sm max-w-2xl">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                <span th:text="${success}">Profile updated successfully.</span>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 max-w-2xl mt-4">
                <div class="flex items-center gap-6 mb-8 border-b border-slate-100 pb-8">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center border-4 border-white shadow-sm overflow-hidden text-blue-600 font-extrabold text-2xl">
                        <span th:text="${tourist != null ? #strings.substring(tourist.name, 0, 1).toUpperCase() : 'U'}">U</span>
                    </div>
                    <div>
                        <h4 class="text-xl font-bold text-slate-800" th:text="${tourist != null ? tourist.name : 'User Name'}">User Name</h4>
                        <p class="text-sm text-slate-500 font-medium">Tourist Account</p>
                    </div>
                </div>
                
                <form th:action="@{/tourist/profile/update}" method="post" class="space-y-6" th:if="${tourist != null}">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-2">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" name="name" th:value="${tourist.name}" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-2">Phone Number <span class="text-red-500">*</span></label>
                            <input type="tel" name="phone" th:value="${tourist.phone}" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-2">Country <span class="text-red-500">*</span></label>
                            <input type="text" name="country" th:value="${tourist.country}" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-2">Email Address (Cannot be changed)</label>
                        <input type="email" th:value="${tourist.email}" readonly class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm bg-slate-50 text-slate-500 cursor-not-allowed outline-none">
                    </div>

                    <div class="pt-4 text-right">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2.5 rounded-xl transition-colors shadow-md shadow-blue-500/20">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
