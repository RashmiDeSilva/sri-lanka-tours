<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin | Admin Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0056b3',
                        lightBg: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .ocean-bg { background: linear-gradient(135deg, #f0f9ff 0%, #e8f4fd 50%, #f0f9ff 100%); min-height: 100vh; }
        .input-field {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            font-size: 0.875rem;
            color: #334155;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #0056b3;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
            outline: none;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 ocean-bg">

    <aside th:replace="~{fragments/admin-sidebar :: sidebar('users')}"></aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col min-h-screen">
        
        <header th:replace="~{fragments/admin-header :: header('User Management', 'Create a new administrator account')}"></header>

        <!-- Main Body -->
        <main class="flex-1 p-8 max-w-xl mx-auto w-full">
            
            <div class="mb-8">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-6 h-6 text-brandBlue"></i> Create Admin Account
                </h2>
                <p class="text-sm text-slate-500 font-medium mt-1">This will grant full administrative privileges to the user.</p>
            </div>

            <!-- Error Notification -->
            <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg flex items-center gap-3 shadow-sm font-bold text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/admin/create-admin}" th:object="${adminForm}" method="post" onsubmit="return validateAdminForm()" class="space-y-6">
                <!-- Main Form Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="shield" class="w-4 h-4 text-slate-400"></i> Admin Profile Details
                        </h3>
                    </div>
                    
                    <div class="p-6 space-y-4">
                        <!-- Full Name -->
                        <div>
                            <label for="name" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Full Name <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="user" class="input-icon"></i>
                                <input type="text" th:field="*{name}" id="name" required class="input-field" placeholder="Enter full name">
                            </div>
                        </div>

                        <!-- Email Address -->
                        <div>
                            <label for="email" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email Address <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="mail" class="input-icon"></i>
                                <input type="email" th:field="*{email}" id="email" required class="input-field" placeholder="admin@example.com">
                            </div>
                        </div>

                        <!-- Phone Number -->
                        <div>
                            <label for="phone" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Phone Number <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="phone" class="input-icon"></i>
                                <input type="tel" th:field="*{phone}" id="phone" required class="input-field" placeholder="Enter phone number">
                            </div>
                        </div>

                        <!-- Password -->
                        <div>
                            <label for="password" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Password <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="lock" class="input-icon"></i>
                                <input type="password" th:field="*{password}" id="password" required class="input-field" placeholder="••••••••">
                            </div>
                            <p class="text-[10px] text-slate-500 mt-1.5 font-medium">Password must be at least 8 characters.</p>
                        </div>

                        <!-- Confirm Password -->
                        <div>
                            <label for="confirmPassword" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Confirm Password <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="lock" class="input-icon"></i>
                                <input type="password" id="confirmPassword" name="confirmPassword" required class="input-field" placeholder="••••••••">
                            </div>
                            <p id="passwordError" class="text-xs text-red-500 mt-1 font-bold hidden">Passwords do not match.</p>
                        </div>

                        <!-- Form Actions -->
                        <div class="flex items-center justify-end gap-3 pt-6 mt-6 border-t border-slate-100">
                            <a th:href="@{/admin/users}" class="px-6 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200 bg-white">Cancel</a>
                            <button type="submit" class="px-6 py-2.5 bg-brandBlue hover:bg-blue-700 text-white text-sm font-bold rounded-xl shadow-md shadow-brandBlue/20 transition-all flex items-center gap-2">
                                <i data-lucide="user-plus" class="w-4 h-4"></i> Create Admin
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
        
        <!-- Footer include -->
        <footer th:replace="~{fragments/admin-footer :: footer}"></footer>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();

        // Password matching validation
        function validateAdminForm() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('passwordError');
            const confirmInput = document.getElementById('confirmPassword');
            
            if (password !== confirmPassword) {
                errorMsg.classList.remove('hidden');
                confirmInput.style.borderColor = '#ef4444'; // red-500
                return false;
            }
            
            errorMsg.classList.add('hidden');
            confirmInput.style.borderColor = '#cbd5e1'; // reset
            return true;
        }

        // Clear error on input type
        document.getElementById('confirmPassword').addEventListener('input', function() {
            document.getElementById('passwordError').classList.add('hidden');
            this.style.borderColor = '#cbd5e1';
        });
    </script>
</body>
</html>
