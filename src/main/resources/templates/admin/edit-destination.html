<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Destination | Admin Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-bg { background: linear-gradient(180deg, #0a2342 0%, #0e3460 40%, #0f4c8a 100%); }
        .ocean-bg { background: linear-gradient(135deg, #f0f9ff 0%, #e8f4fd 50%, #f0f9ff 100%); min-height: 100vh; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 10px; color: #93c5fd; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s ease; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.12); color: #ffffff; }
        .nav-item.active { background: linear-gradient(90deg, #2563eb, #1d4ed8); color: #ffffff; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.5); }
        .nav-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #60a5fa; padding: 14px 20px 4px; }
        .top-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(14, 52, 96, 0.1); }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 ocean-bg">

    <aside th:replace="~{fragments/admin-sidebar :: sidebar('destinations')}"></aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col min-h-screen">
        
        <header th:replace="~{fragments/admin-header :: header('Destination Management', 'Update destination details in the system database')}"></header>

        <!-- Main Body -->
        <main class="flex-1 p-8 max-w-5xl mx-auto w-full">
            
            <div class="mb-8">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="pencil" class="w-6 h-6 text-blue-600"></i> Edit Destination
                </h2>
                <p class="text-sm text-slate-500 font-medium mt-1">Update existing destination details in the system database</p>
            </div>

            <form th:action="@{/admin/destinations/{id}(id=${destination.id})}" th:object="${destination}" method="post" class="space-y-6">
                <!-- Main Form Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="file-edit" class="w-4 h-4 text-slate-400"></i> Destination Details
                        </h3>
                    </div>
                    
                    <div class="p-6">
                        <!-- Horizontal Grid Layout -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <!-- Name (Full Width) -->
                            <div class="md:col-span-2">
                                <label for="name" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="type" class="w-3.5 h-3.5 text-slate-400"></i> Destination Name <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <input type="text" th:field="*{name}" id="name" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white" placeholder="E.g., Sigiriya Rock Fortress">
                                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs mt-1 font-medium flex items-center gap-1">
                                    <i data-lucide="alert-circle" class="w-3 h-3"></i> Error
                                </p>
                            </div>

                            <!-- Province -->
                            <div>
                                <label for="province" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="map" class="w-3.5 h-3.5 text-slate-400"></i> Province <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <select th:field="*{province}" id="province" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white appearance-none cursor-pointer">
                                    <option value="" disabled>Select Province</option>
                                    <option th:each="prov : ${T(com.example.tour_guide_system.entity.Destination$Province).values()}" th:value="${prov}" th:text="${prov.displayName}"></option>
                                </select>
                                <p th:if="${#fields.hasErrors('province')}" th:errors="*{province}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>

                            <!-- District -->
                            <div>
                                <label for="district" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-400"></i> District <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <select th:field="*{district}" id="district" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white appearance-none cursor-pointer">
                                    <option value="" disabled>Select District</option>
                                    <option value="Colombo">Colombo</option><option value="Gampaha">Gampaha</option><option value="Kalutara">Kalutara</option>
                                    <option value="Kandy">Kandy</option><option value="Matale">Matale</option><option value="Nuwara Eliya">Nuwara Eliya</option>
                                    <option value="Galle">Galle</option><option value="Matara">Matara</option><option value="Hambantota">Hambantota</option>
                                    <option value="Jaffna">Jaffna</option><option value="Kilinochchi">Kilinochchi</option><option value="Mannar">Mannar</option>
                                    <option value="Vavuniya">Vavuniya</option><option value="Mullaitivu">Mullaitivu</option><option value="Batticaloa">Batticaloa</option>
                                    <option value="Ampara">Ampara</option><option value="Trincomalee">Trincomalee</option><option value="Kurunegala">Kurunegala</option>
                                    <option value="Puttalam">Puttalam</option><option value="Anuradhapura">Anuradhapura</option><option value="Polonnaruwa">Polonnaruwa</option>
                                    <option value="Badulla">Badulla</option><option value="Moneragala">Moneragala</option><option value="Ratnapura">Ratnapura</option>
                                    <option value="Kegalle">Kegalle</option>
                                </select>
                                <p th:if="${#fields.hasErrors('district')}" th:errors="*{district}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>

                            <!-- City -->
                            <div>
                                <label for="city" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="building" class="w-3.5 h-3.5 text-slate-400"></i> City <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <input type="text" th:field="*{city}" id="city" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white" placeholder="Enter city name">
                                <p th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>

                            <!-- Category -->
                            <div>
                                <label for="category" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="tag" class="w-3.5 h-3.5 text-slate-400"></i> Category <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <select th:field="*{category}" id="category" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white appearance-none cursor-pointer">
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${#strings.capitalize(#strings.toLowerCase(cat.name()))}"></option>
                                </select>
                                <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>

                            <!-- Entry Fee -->
                            <div>
                                <label for="entryFee" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="banknote" class="w-3.5 h-3.5 text-slate-400"></i> Entry Fee (Rs.)
                                </label>
                                <input type="number" step="0.01" min="0" th:field="*{entryFee}" id="entryFee" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white" placeholder="0.00">
                                <p th:if="${#fields.hasErrors('entryFee')}" th:errors="*{entryFee}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>



                            <!-- Opening Hours -->
                            <div>
                                <label for="openingHours" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="clock" class="w-3.5 h-3.5 text-slate-400"></i> Opening Hours
                                </label>
                                <div class="relative">
                                    <input type="time" th:field="*{openingHours}" id="openingHours" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white cursor-pointer appearance-none">
                                </div>
                            </div>

                            <!-- Closing Hours -->
                            <div>
                                <label for="closingHours" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="clock-4" class="w-3.5 h-3.5 text-slate-400"></i> Closing Hours
                                </label>
                                <div class="relative">
                                    <input type="time" th:field="*{closingHours}" id="closingHours" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white cursor-pointer appearance-none">
                                </div>
                            </div>

                            <!-- Best Time -->
                            <div>
                                <label for="bestTimeToVisit" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="sun" class="w-3.5 h-3.5 text-slate-400"></i> Best Time to Visit
                                </label>
                                <input type="text" th:field="*{bestTimeToVisit}" id="bestTimeToVisit" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white" placeholder="e.g. May - August">
                                <p th:if="${#fields.hasErrors('bestTimeToVisit')}" th:errors="*{bestTimeToVisit}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>

                            <!-- Status -->
                            <div>
                                <label for="status" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="activity" class="w-3.5 h-3.5 text-slate-400"></i> Status <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <select th:field="*{status}" id="status" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white appearance-none cursor-pointer">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>

                            <!-- Image URL (Full Width) -->
                            <div class="md:col-span-2">
                                <label for="imageUrl" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="image" class="w-3.5 h-3.5 text-slate-400"></i> Image URL
                                </label>
                                <input type="url" th:field="*{imageUrl}" id="imageUrl" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white" placeholder="https://..." onchange="document.getElementById('imagePreview').src = this.value; document.getElementById('imagePreviewContainer').style.display = this.value ? 'block' : 'none';">
                                <p th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>

                            <!-- Description (Full Width) -->
                            <div class="md:col-span-2">
                                <label for="description" class="flex items-center gap-1.5 text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                    <i data-lucide="align-left" class="w-3.5 h-3.5 text-slate-400"></i> Description <span class="text-red-500 text-lg leading-none ml-1">*</span>
                                </label>
                                <textarea th:field="*{description}" id="description" required rows="4" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all bg-slate-50 hover:bg-white resize-y" placeholder="Enter detailed description..."></textarea>
                                <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-red-500 text-xs mt-1 font-medium"></p>
                            </div>
                        </div>

                        <!-- Image Preview Box -->
                        <div class="mt-8 border border-slate-200 rounded-2xl bg-slate-50 p-6 flex flex-col items-center justify-center relative overflow-hidden" style="min-h: 200px;">
                            <div id="imagePreviewContainer" th:style="${destination.imageUrl != null and !destination.imageUrl.isEmpty()} ? 'display:block;' : 'display:none;'" class="w-full h-full max-w-lg mx-auto">
                                <img id="imagePreview" th:src="${destination.imageUrl}" alt="Image Preview" class="w-full h-auto rounded-xl shadow-md border border-slate-200 object-cover" onerror="this.onerror=null; this.parentElement.style.display='none'; document.getElementById('previewFallback').style.display='flex';">
                            </div>
                            <div id="previewFallback" th:style="${destination.imageUrl == null or destination.imageUrl.isEmpty()} ? 'display:flex;' : 'display:none;'" class="flex flex-col items-center text-slate-400 gap-3">
                                <i data-lucide="image-plus" class="w-10 h-10"></i>
                                <span class="text-sm font-medium">Image preview will appear here</span>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="flex items-center justify-end gap-3 pt-6 mt-6 border-t border-slate-100">
                            <a th:href="@{/admin/destinations}" class="px-6 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200 bg-white">Cancel</a>
                            <button type="submit" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center gap-2">
                                <i data-lucide="save" class="w-4 h-4"></i> Update Destination
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
        
        <!-- Footer include -->
        <footer th:replace="~{fragments/admin-footer :: footer}"></footer>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();

        // Province to District Mapping
        const provinceDistrictMap = {
            'WESTERN': ['Colombo', 'Gampaha', 'Kalutara'],
            'CENTRAL': ['Kandy', 'Matale', 'Nuwara Eliya'],
            'SOUTHERN': ['Galle', 'Matara', 'Hambantota'],
            'NORTHERN': ['Jaffna', 'Kilinochchi', 'Mannar', 'Mullaitivu', 'Vavuniya'],
            'EASTERN': ['Trincomalee', 'Batticaloa', 'Ampara'],
            'NORTH_WESTERN': ['Kurunegala', 'Puttalam'],
            'NORTH_CENTRAL': ['Anuradhapura', 'Polonnaruwa'],
            'UVA': ['Badulla', 'Moneragala'],
            'SABARAGAMUWA': ['Ratnapura', 'Kegalle']
        };

        const provinceSelect = document.getElementById('province');
        const districtSelect = document.getElementById('district');

        provinceSelect.addEventListener('change', function() {
            const selectedProvince = this.value;
            const districts = provinceDistrictMap[selectedProvince] || [];
            
            // Clear current options
            districtSelect.options.length = 0;
            const defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.disabled = true;
            defaultOpt.selected = true;
            defaultOpt.textContent = 'Select District';
            districtSelect.appendChild(defaultOpt);
            
            // Add new options
            districts.forEach(district => {
                const option = document.createElement('option');
                option.value = district;
                option.textContent = district;
                districtSelect.appendChild(option);
            });
        });

        // Trigger change event on load if province is already selected
        if (provinceSelect.value) {
            const selectedProvince = provinceSelect.value;
            const currentDistrict = districtSelect.value;
            
            const districts = provinceDistrictMap[selectedProvince] || [];
            districtSelect.options.length = 0;
            const defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.disabled = true;
            defaultOpt.selected = true;
            defaultOpt.textContent = 'Select District';
            districtSelect.appendChild(defaultOpt);
            
            districts.forEach(district => {
                const option = document.createElement('option');
                option.value = district;
                option.textContent = district;
                if (district === currentDistrict) {
                    option.selected = true;
                }
                districtSelect.appendChild(option);
            });
        }
    </script>
</body>
</html>
