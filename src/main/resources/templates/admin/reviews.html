<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Management | Sri Lanka Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandBlue: '#0056b3', lightBg: '#f8fafc' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .stat-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 8px;
            padding: 16px; display: flex; align-items: flex-start; gap: 12px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }
        .star-filled { color: #f59e0b; fill: #f59e0b; }
        .star-empty { color: #d1d5db; fill: #d1d5db; }
        .table-row { transition: background 0.15s ease; }
        .table-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen bg-lightBg overflow-hidden text-slate-800">

    <aside th:replace="~{fragments/admin-sidebar :: sidebar('reviews')}"></aside>

    <main class="flex-1 flex flex-col min-w-0 bg-lightBg z-10">
        <header th:replace="~{fragments/admin-header :: header('Review & Rating Management', 'Monitor all traveler reviews and moderate content')}"></header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg flex items-center gap-3 shadow-sm">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span th:text="${error}" class="text-sm font-bold"></span>
            </div>
            <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center gap-3 shadow-sm">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                <span th:text="${success}" class="text-sm font-bold"></span>
            </div>

            <!-- Stats Row -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                <div class="stat-card">
                    <div class="w-10 h-10 rounded-lg bg-yellow-100 text-yellow-700 flex items-center justify-center shrink-0">
                        <i data-lucide="star" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="text-xs font-bold text-slate-500">Total Reviews</div>
                        <div class="text-2xl font-black text-slate-950" th:text="${reviews.size()}">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="w-10 h-10 rounded-lg bg-emerald-100 text-emerald-700 flex items-center justify-center shrink-0">
                        <i data-lucide="trending-up" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="text-xs font-bold text-slate-500">Avg. Rating</div>
                        <div class="text-2xl font-black text-slate-950" th:text="${reviewAverage != null ? #numbers.formatDecimal(reviewAverage, 1, 'DEFAULT', 1, 'DEFAULT') : 'N/A'}">0.0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="w-10 h-10 rounded-lg bg-blue-100 text-brandBlue flex items-center justify-center shrink-0">
                        <i data-lucide="message-square" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="text-xs font-bold text-slate-500">5-Star Reviews</div>
                        <div class="text-2xl font-black text-slate-950" th:text="${fiveStarReviewCount}">0</div>
                    </div>
                </div>
            </div>

            <!-- Reviews Table -->
            <div class="bg-white rounded-lg border border-slate-200 flex flex-col shadow-sm">
                <div class="p-5 border-b border-slate-200 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                    <div>
                        <h2 class="text-base font-black text-slate-900">All Traveler Reviews</h2>
                        <p class="text-xs text-slate-500 font-semibold">You can delete any review as admin</p>
                    </div>
                    <a href="/reviews" target="_blank" class="bg-brandBlue hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 text-sm self-start sm:self-auto shadow-sm">
                        <i data-lucide="external-link" class="w-4 h-4"></i> Public Review Page
                    </a>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-3 text-xs font-black text-slate-900">Reviewer</th>
                                <th class="px-6 py-3 text-xs font-black text-slate-900">Comment</th>
                                <th class="px-6 py-3 text-xs font-black text-slate-900 text-center">Rating</th>
                                <th class="px-6 py-3 text-xs font-black text-slate-900">Date</th>
                                <th class="px-6 py-3 text-xs font-black text-slate-900 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm">
                            <tr th:each="review : ${reviews}" class="table-row">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white font-black text-sm shrink-0"
                                             style="background: linear-gradient(135deg, #3b82f6, #6366f1);"
                                             th:text="${review.reviewerName != null ? #strings.substring(review.reviewerName, 0, 1).toUpperCase() : 'A'}">A</div>
                                        <div>
                                            <div class="font-black text-slate-900" th:text="${review.reviewerName} ?: 'Anonymous'">Name</div>
                                            <div class="text-[11px] text-slate-500 font-medium" th:text="${review.authorEmail} ?: ''">email</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 max-w-xs">
                                    <p class="text-slate-700 font-medium truncate" th:text="${review.comment}">Comment here</p>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <div class="flex items-center justify-center gap-0.5">
                                        <svg th:each="i : ${#numbers.sequence(1,5)}"
                                             th:class="${i <= review.rating ? 'w-4 h-4 star-filled' : 'w-4 h-4 star-empty'}"
                                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs font-black text-slate-600" th:text="${review.rating + '/5'}">5/5</span>
                                </td>
                                <td class="px-6 py-4 text-slate-500 font-medium text-xs"
                                    th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'dd MMM yyyy') : 'N/A'}">Date</td>
                                <td class="px-6 py-4 text-center">
                                    <div class="flex items-center justify-center gap-2">
                                        <a th:href="@{/admin/reviews/{id}/delete(id=${review.id})}"
                                           onclick="return confirm('Are you sure you want to permanently delete this review?')"
                                           class="w-8 h-8 rounded bg-red-50 text-red-700 flex items-center justify-center hover:bg-red-100" title="Delete Review">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reviews)}">
                                <td colspan="5" class="py-12 text-center">
                                    <div class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
                                        <i data-lucide="star" class="w-7 h-7 text-slate-400"></i>
                                    </div>
                                    <h3 class="text-sm font-bold text-slate-700">No reviews yet</h3>
                                    <p class="text-xs text-slate-500 mt-1">Reviews submitted by users will appear here.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/admin-footer :: footer}"></footer>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
