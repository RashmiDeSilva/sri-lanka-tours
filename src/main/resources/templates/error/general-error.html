<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status + ' - Error'}">Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fbff 0%, #eef5ff 50%, #f8fbff 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-800">
    <main class="w-full max-w-2xl rounded-[2rem] border border-slate-200 bg-white/95 p-8 md:p-10 shadow-[0_24px_80px_rgba(15,23,42,0.12)]">
        <div class="mb-6 flex items-center gap-3">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-red-50 text-red-600">
                <i data-lucide="triangle-alert" class="h-7 w-7"></i>
            </div>
            <div>
                <p class="text-sm font-black uppercase tracking-[0.28em] text-slate-400" th:text="${'Error ' + status}">Error 500</p>
                <h1 class="text-3xl font-black tracking-tight text-slate-950" th:text="${title}">Something went wrong</h1>
            </div>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5 text-sm leading-relaxed text-slate-600">
            <p th:text="${message}">Please try again later.</p>
            <p class="mt-3 text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Path</p>
            <p class="mt-1 text-sm font-medium text-slate-700" th:text="${path}">/</p>
        </div>

        <div class="mt-6 flex flex-wrap gap-3">
            <a th:href="${backUrl != null and !#strings.isEmpty(backUrl) ? backUrl : '/'}"
               class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-5 py-3 text-sm font-black text-white shadow-md shadow-blue-200 transition-colors hover:bg-blue-700">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>
                Go Back
            </a>
            <a th:href="@{/}" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-5 py-3 text-sm font-black text-slate-700 transition-colors hover:bg-slate-50">
                <i data-lucide="home" class="h-4 w-4"></i>
                Home
            </a>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
