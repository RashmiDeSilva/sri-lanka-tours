# ============================================================
# Tour Guide System - Application Configuration
# ============================================================
spring.application.name=tour_guide_system

# ============================================================
# Database Configuration (MySQL)
# Override via environment variables in production:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/t_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# ============================================================
# SQL Initialization
# ============================================================
spring.sql.init.mode=always

# ============================================================
# Server
# ============================================================
server.port=${SERVER_PORT:8085}

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false

# ============================================================
# Logging
# ============================================================
logging.file.name=application.log
logging.level.com.example.tour_guide_system=INFO
logging.level.org.springframework.security=WARN
